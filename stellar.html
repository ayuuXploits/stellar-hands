<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stellar Hands - Mac M4 Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; color: white; }
        canvas { display: block; }
        .glass { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #camera-preview {
            position: absolute; bottom: 20px; right: 20px;
            width: 180px; height: 135px; border-radius: 12px;
            border: 2px solid #3b82f6; background: #111;
            transform: scaleX(-1); overflow: hidden; z-index: 100;
        }
        #skeleton-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .ui-panel { position: absolute; top: 20px; left: 20px; z-index: 50; width: 260px; }
        .btn-shape { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; font-size: 12px; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-shape.active { background: #2563eb; border-color: #60a5fa; }
    </style>
</head>
<body>

<div id="overlay-start" class="fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-[2000]">
    <h1 class="text-4xl font-black italic mb-2">STELLAR HANDS</h1>
    <p id="mac-status" class="text-blue-400 font-mono text-sm mb-8 italic">INITIALIZING SENSORS...</p>
    <button id="btn-launch" class="bg-blue-600 hover:bg-blue-500 px-12 py-4 rounded-full font-bold text-xl transition-all hover:scale-105">
        START ENGINE
    </button>
</div>

<div class="ui-panel glass p-5 rounded-2xl hidden" id="main-ui">
    <div class="flex justify-between items-center mb-4">
        <h2 class="font-black italic text-xl">STELLAR</h2>
        <div id="gesture-display" class="bg-blue-500/20 border border-blue-500/50 px-3 py-1 rounded-full text-[10px] font-bold text-blue-400">WAITING...</div>
    </div>
    <div class="grid grid-cols-2 gap-2 mb-6">
        <button class="btn-shape active" onclick="setTemplate('galaxy', this)">Galaxy</button>
        <button class="btn-shape" onclick="setTemplate('heart', this)">Heart</button>
        <button class="btn-shape" onclick="setTemplate('flower', this)">Flower</button>
        <button class="btn-shape" onclick="setTemplate('saturn', this)">Saturn</button>
    </div>
    <div class="text-[10px] opacity-50 text-center">Touch/Mouse active as fallback</div>
</div>

<div id="camera-preview">
    <video id="input-video" class="hidden" playsinline></video>
    <canvas id="skeleton-canvas"></canvas>
</div>

<script>
    const COUNT = 45000;
    let scene, camera, renderer, points, posArr, velArr, targetArr, colorArr;
    let handX = 0, handY = 0, isHandActive = false, currentGesture = 'none';

    function getPositions(type) {
        const p = new Float32Array(COUNT * 3), c = new Float32Array(COUNT * 3);
        for (let i = 0; i < COUNT; i++) {
            let x, y, z, r, g, b, i3 = i * 3;
            if (type === 'heart') {
                const t = Math.random() * Math.PI * 2;
                x = 16 * Math.pow(Math.sin(t), 3); y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t); z = (Math.random()-0.5)*5;
                const s = 0.5 + Math.random()*0.5; x *= s; y *= s; r = 1; g = 0.1; b = 0.3;
            } else if (type === 'saturn') {
                const ring = Math.random() > 0.4;
                if (ring) { const rr = 13 + Math.random()*8, a = Math.random()*Math.PI*2; x = rr*Math.cos(a); y = (Math.random()-0.5)*2; z = rr*Math.sin(a); r = 0.9; g = 0.8; b = 0.6; }
                else { const phi = Math.random()*Math.PI*2, th = Math.random()*Math.PI; x = 8*Math.sin(th)*Math.cos(phi); y = 8*Math.sin(th)*Math.sin(phi); z = 8*Math.cos(th); r = 1; g = 0.9; b = 0.4; }
            } else { // Galaxy
                const d = Math.random()*26, s = d*0.45; x = d*Math.cos(s + Math.random()*0.2); y = (Math.random()-0.5)*(26-d)*0.25; z = d*Math.sin(s + Math.random()*0.2); r = 0.2; g = 0.5; b = 1;
            }
            p[i3] = x; p[i3+1] = y; p[i3+2] = z; c[i3] = r; c[i3+1] = g; c[i3+2] = b;
        }
        return { p, c };
    }

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 45;
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const data = getPositions('galaxy');
        targetArr = data.p; posArr = new Float32Array(COUNT*3); velArr = new Float32Array(COUNT*3); colorArr = data.c;
        for(let i=0; i<COUNT*3; i++) posArr[i] = targetArr[i] + (Math.random()-0.5)*150;
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colorArr, 3));
        points = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.18, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending }));
        scene.add(points);
        
        // Mouse Fallback
        window.addEventListener('pointermove', (e) => {
            if (!isHandActive) {
                handX = (e.clientX / window.innerWidth - 0.5) * 80;
                handY = (0.5 - e.clientY / window.innerHeight) * 60;
                currentGesture = e.buttons === 1 ? 'pinch' : 'open';
            }
        });
        
        animate();
    }

    async function initAI() {
        const video = document.getElementById('input-video');
        const canvas = document.getElementById('skeleton-canvas');
        const ctx = canvas.getContext('2d');
        
        // MacOS Specific: Request specific media constraints
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        video.srcObject = stream;
        await video.play();

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults((results) => {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.multiHandLandmarks?.length > 0) {
                isHandActive = true;
                const lm = results.multiHandLandmarks[0];
                drawConnectors(ctx, lm, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
                handX = (0.5 - lm[9].x) * 110; handY = (0.5 - lm[9].y) * 85;
                const dP = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                currentGesture = dP < 0.05 ? 'pinch' : 'open';
                document.getElementById('gesture-display').innerText = currentGesture;
            } else { isHandActive = false; document.getElementById('gesture-display').innerText = "SEARCHING..."; }
        });

        const cam = new Camera(video, { onFrame: async () => { await hands.send({image: video}); } });
        return cam.start();
    }

    function animate() {
        requestAnimationFrame(animate);
        const p = points.geometry.attributes.position.array;
        for (let i = 0; i < COUNT; i++) {
            const i3 = i * 3;
            velArr[i3] += (targetArr[i3] - p[i3]) * 0.005;
            velArr[i3+1] += (targetArr[i3+1] - p[i3+1]) * 0.005;
            velArr[i3+2] += (targetArr[i3+2] - p[i3+2]) * 0.005;
            const dx = handX - p[i3], dy = handY - p[i3+1], dSq = dx*dx + dy*dy;
            if (dSq < 900) {
                const force = (1 - Math.sqrt(dSq) / 30);
                if (currentGesture === 'pinch') { velArr[i3] += dx*force*0.045; velArr[i3+1] += dy*force*0.045; }
                else { velArr[i3] -= dx*force*0.05; velArr[i3+1] -= dy*force*0.05; }
            }
            velArr[i3] *= 0.94; velArr[i3+1] *= 0.94; velArr[i3+2] *= 0.94;
            p[i3] += velArr[i3]; p[i3+1] += velArr[i3+1]; p[i3+2] += velArr[i3+2];
        }
        points.geometry.attributes.position.needsUpdate = true;
        points.rotation.y += 0.001;
        renderer.render(scene, camera);
    }

    function setTemplate(n, b) {
        const d = getPositions(n); targetArr = d.p;
        const cAttr = points.geometry.attributes.color;
        for(let i=0; i<COUNT*3; i++) colorArr[i] = d.c[i];
        cAttr.needsUpdate = true;
        document.querySelectorAll('.btn-shape').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
    }

    document.getElementById('btn-launch').onclick = async () => {
        try {
            document.getElementById('overlay-start').style.display = 'none';
            document.getElementById('main-ui').classList.remove('hidden');
            init();
            await initAI();
        } catch (e) {
            console.error(e);
            alert("Mac Privacy Error: Please enable Camera in System Settings > Privacy & Security > Camera.");
        }
    };
</script>
</body>
</html>
